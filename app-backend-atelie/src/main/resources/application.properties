spring.application.name=app-backend-atelie

# Configuracoes do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/ateliecibs?useSSL=false
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracoes do Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# Variaveis de ambiente para o JWT
api.security.token.secret=${JWT_SECRET:mysecretkey}

