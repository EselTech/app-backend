spring.application.name=app-backend-atelie

# Configuraþ§es do banco de dados
spring.datasource.url=jdbc:mysql://localhost:3306/ateliecibs?useSSL=false
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Configuracoes do Swagger/OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true

# Variaveis de ambiente para o JWT
api.security.token.secret=${JWT_SECRET:mysecretkey}

# Configuracao de CORS - origens permitidas (separadas por virgula)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}


